<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
      }

      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user {
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot {
        display: flex;
        justify-content: start;
        align-items: start;
      }

      .chat-message-text {
        background: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }

      .chat-message-profile {
        width: 45px;
      }

      .chat-messages-container {
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .welcome-message {
        text-align: center;
        color: rgb(120, 120, 120);
      }

      .loading-image {
        height: 40px;
        margin: -15px;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
       function useAutoScroll(dependencies) {
        const chatMessagesRef = React.useRef(null);
        // Let's you save an element into here

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;

          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, dependencies); 
        
        return chatMessagesRef;
       }

     function ChatInput({chatMessages, setChatMessages}) {
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setLoadingState] = React.useState(false);
        function saveInputText(event) {
         setInputText(event.target.value);
        }

        async function sendMessage() {
         if (isLoading || (inputText === '')) {
          return;
         }

         setInputText('');
         setLoadingState(true);

         const newChatMessages = [
          ...chatMessages, {
          message: inputText,
          sender: 'user',
          id: crypto.randomUUID()
        }
        ];

        const loadingMessage = [
          ...newChatMessages, {
          message: <img 
                    src="loading-spinner.gif" 
                    className="loading-image"
                   />,
          sender: 'robot',
          id: crypto.randomUUID()
        }
        ];
        
         setChatMessages(loadingMessage); //Replaces the current data with a new array

         const response = await Chatbot.getResponseAsync(inputText);
         console.log(response);
          setChatMessages([
          ...newChatMessages, {
          message: response,
          sender: 'robot',
          id: crypto.randomUUID()
        }
        ]);
        setLoadingState(false);
        }

        function enterMessage(event) {
         if (event.key === 'Enter') {
          sendMessage()
         }

         if (event.key === 'Escape') {
          setInputText('');
         }
        }

        return (
          <div className="chat-input-container">
           <input 
            placeholder="Send a message to Chatbot" 
            size="30"
            onChange={saveInputText}
            onKeyDown={enterMessage}
            value={inputText}
            className="chat-input"
           />
           <button 
            onClick={sendMessage}
            className="send-button"
           >Send</button>
          </div>
        );
      }

     function ChatMessage({message, sender}) {
        // const message = props.message;
        // const sender = props.sender;
        // const {message, sender} = props;
       
       /*
       if (sender === "robot") {
         return (
          <div>
           <img src="robot.png" width="50" />
           {message}
          </div>
        );
       }
      */

        return (
          <div className={
            sender === 'user'
             ? 'chat-message-user'
             : 'chat-message-robot'
          }>
           {sender === "robot" &&  (
            <img src="robot.png" 
            className="chat-message-profile" />
           )}
           <div className="chat-message-text">
            {message}
           </div>
           {sender === "user" && (
            <img src="user.png" 
            className="chat-message-profile" />
          )}
          </div>
        );
      }
      

    function ChatMessages({chatMessages}) {
    
     const chatMessagesRef = useAutoScroll([chatMessages]);
     // The ref attribute saves the element into the useRef hook

     return (
      <div 
      className="chat-messages-container"
      ref={chatMessagesRef}>
      {chatMessages.length === 0 
       ? <p
          className="welcome-message" >
          Welcome to the chatbot project! Send a message using the textbox below.
         </p>
       : chatMessages.map(({message, sender, id}) => {
          return (
            <ChatMessage 
            message={message}
            sender={sender}
            key={id}
            />
          );
          }) 
      } 
      </div>
    );

      }

      function App() {
      const [chatMessages, setChatMessages] = React.useState([]);
      
      // const [chatMessages, setChatMessages] = array;

      /*
      const chatMessages = array[0]; // Current Data
      const setChatMessages = array[1]; // Updates the data
      */

      return (
       <div className="app-container">
        <ChatMessages 
         chatMessages={chatMessages}
        />
        <ChatInput
         chatMessages={chatMessages}
         setChatMessages={setChatMessages}
         />
       </div>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
