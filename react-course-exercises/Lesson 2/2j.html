<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({name, price, imageSrc, discountPrice}) {
       return (
        <div>
         <img src={imageSrc} width="100"/>
         <p>{name}</p>
         {discountPrice ?  (
          <>
           <p><del>Price: ${price}</del></p>
           <p>Discount Price: ${discountPrice}</p>
          </>
         ) : (
          <p>Price: ${price}</p>
         )}
         <button>Add to Cart</button>
        </div>
       );
      }


      function App() {
       return (
        <>
         <ProductDetails name="Cotton Socks" price="10.90" imageSrc="cotton-socks.png" discountPrice="5.45"/>
         <ProductDetails name="Tennis Balls" price="6.00" imageSrc="tennis-balls.png"/>
         <ProductDetails name="Plain T-Shirt" price="7.99" imageSrc="plain-t-shirt.png"/>
        </>
       );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
